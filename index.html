<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧹 HK Pro Training | Housekeeping Excellence Program</title>
<link href="https://script.google.com/macros/s/AKfycbyyV7bMjAvtRXPSil6N_KYLgK097pmmDcWrr8GscrmlJJUZWHpdGm5w5Wljg2u_tzZZHA/exec" rel="stylesheet">
<style>
  :root {
    --primary: #1a73e8;
    --primary-dark: #1557b0;
    --accent: #fbbc04;
    --success: #34a853;
    --danger: #ea4335;
    --bg: #f0f4f9;
    --card: #ffffff;
    --text: #1c2b4a;
    --muted: #5f7a99;
    --border: #d8e3f0;
    --gradient: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
    --shadow: 0 4px 20px rgba(26,115,232,0.12);
    --radius: 16px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Hind', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* SPLASH / REGISTRATION */
  #splash {
    min-height: 100vh;
    background: var(--gradient);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }
  #splash::before {
    content: '';
    position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }
  .splash-logo { font-size: 72px; margin-bottom: 8px; }
  .splash-title {
    font-family: 'Baloo 2', cursive;
    font-size: 28px; font-weight: 800;
    color: #fff; text-align: center;
    margin-bottom: 4px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .splash-sub {
    color: rgba(255,255,255,0.8);
    font-size: 15px; text-align: center;
    margin-bottom: 32px;
  }
  .reg-card {
    background: white;
    border-radius: 24px;
    padding: 32px 28px;
    width: 100%; max-width: 400px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  }
  .reg-card h2 {
    font-family: 'Baloo 2', cursive;
    font-size: 20px; font-weight: 700;
    color: var(--text); margin-bottom: 20px;
    text-align: center;
  }
  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block; font-size: 13px;
    font-weight: 600; color: var(--muted);
    margin-bottom: 6px; text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .form-group input, .form-group select {
    width: 100%; padding: 12px 14px;
    border: 2px solid var(--border);
    border-radius: 10px; font-size: 15px;
    font-family: 'Hind', sans-serif;
    transition: border-color 0.2s;
    outline: none;
  }
  .form-group input:focus, .form-group select:focus {
    border-color: var(--primary);
  }
  .btn-primary {
    width: 100%; padding: 14px;
    background: var(--gradient);
    color: white; border: none;
    border-radius: 12px; font-size: 16px;
    font-weight: 700; font-family: 'Baloo 2', cursive;
    cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 15px rgba(26,115,232,0.35);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(26,115,232,0.45); }
  .btn-primary:active { transform: translateY(0); }

  /* MAIN APP */
  #app { display: none; }
  .app-header {
    background: var(--gradient);
    padding: 16px 20px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 20px rgba(26,115,232,0.3);
  }
  .header-inner {
    max-width: 600px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-brand {
    font-family: 'Baloo 2', cursive;
    font-size: 18px; font-weight: 800; color: white;
  }
  .header-staff { color: rgba(255,255,255,0.85); font-size: 13px; }

  /* PROGRESS BAR */
  .progress-section {
    background: var(--gradient);
    padding: 0 20px 20px;
  }
  .progress-inner { max-width: 600px; margin: 0 auto; }
  .progress-label {
    color: rgba(255,255,255,0.9); font-size: 13px;
    margin-bottom: 8px; display: flex; justify-content: space-between;
  }
  .progress-bar {
    height: 8px; background: rgba(255,255,255,0.2);
    border-radius: 99px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--accent);
    border-radius: 99px; transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1);
  }

  /* DAY CARDS */
  .content {
    max-width: 600px; margin: 0 auto;
    padding: 20px 16px 80px;
  }
  .section-title {
    font-family: 'Baloo 2', cursive;
    font-size: 18px; font-weight: 700;
    color: var(--text); margin-bottom: 14px;
    padding-left: 4px;
  }
  .day-grid { display: flex; flex-direction: column; gap: 12px; }
  .day-card {
    background: var(--card);
    border-radius: var(--radius);
    border: 2px solid var(--border);
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
  }
  .day-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
  .day-card.locked { opacity: 0.6; cursor: not-allowed; }
  .day-card.locked:hover { transform: none; box-shadow: none; }
  .day-card.completed { border-color: var(--success); }
  .day-card.active { border-color: var(--primary); box-shadow: 0 4px 20px rgba(26,115,232,0.15); }

  .day-header {
    display: flex; align-items: center;
    padding: 16px; gap: 14px;
  }
  .day-icon {
    width: 52px; height: 52px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; flex-shrink: 0;
  }
  .day-card.completed .day-icon { background: #e8f5e9; }
  .day-card.active .day-icon { background: #e3f2fd; }
  .day-card.locked .day-icon { background: #f5f5f5; }

  .day-info { flex: 1; }
  .day-num {
    font-size: 11px; font-weight: 700;
    color: var(--muted); text-transform: uppercase;
    letter-spacing: 1px;
  }
  .day-title {
    font-family: 'Baloo 2', cursive;
    font-size: 16px; font-weight: 700;
    color: var(--text); line-height: 1.2;
  }
  .day-subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .day-status { font-size: 22px; }

  /* LESSON VIEW */
  #lesson-view { display: none; }
  .lesson-header {
    background: var(--gradient);
    padding: 16px 20px 24px;
  }
  .lesson-header-inner { max-width: 600px; margin: 0 auto; }
  .back-btn {
    background: rgba(255,255,255,0.2);
    border: none; color: white;
    padding: 8px 14px; border-radius: 8px;
    font-size: 14px; cursor: pointer;
    font-family: 'Hind', sans-serif;
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 12px; width: fit-content;
  }
  .back-btn:hover { background: rgba(255,255,255,0.3); }
  .lesson-day-label {
    font-size: 12px; color: rgba(255,255,255,0.7);
    text-transform: uppercase; letter-spacing: 1px;
  }
  .lesson-title {
    font-family: 'Baloo 2', cursive;
    font-size: 22px; font-weight: 800;
    color: white; margin-top: 4px;
  }
  .lesson-objective {
    background: rgba(255,255,255,0.15);
    border-radius: 10px; padding: 10px 14px;
    margin-top: 12px; font-size: 13px;
    color: rgba(255,255,255,0.9);
  }
  .lesson-content {
    max-width: 600px; margin: 0 auto;
    padding: 20px 16px 100px;
  }
  .topic-section {
    background: var(--card);
    border-radius: var(--radius);
    margin-bottom: 16px;
    overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .topic-header {
    padding: 14px 16px;
    background: linear-gradient(135deg, #f8faff 0%, #eef3ff 100%);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .topic-emoji { font-size: 22px; }
  .topic-name {
    font-family: 'Baloo 2', cursive;
    font-size: 16px; font-weight: 700;
    color: var(--text);
  }
  .topic-body { padding: 14px 16px; }
  .topic-point {
    display: flex; align-items: flex-start; gap: 10px;
    margin-bottom: 10px;
  }
  .topic-point:last-child { margin-bottom: 0; }
  .point-bullet {
    width: 6px; height: 6px;
    background: var(--primary); border-radius: 50%;
    margin-top: 8px; flex-shrink: 0;
  }
  .point-text { font-size: 15px; line-height: 1.5; color: var(--text); }
  .point-sub {
    font-size: 13px; color: var(--muted);
    margin-top: 3px;
  }

  /* IMAGE SECTION */
  .image-section {
    background: #f8faff;
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 16px;
    border: 1px solid var(--border);
  }
  .image-section-title {
    font-size: 13px; font-weight: 600;
    color: var(--muted); margin-bottom: 10px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .image-grid {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }
  .img-card {
    border-radius: 10px; overflow: hidden;
    aspect-ratio: 4/3;
    background: var(--border);
    position: relative;
  }
  .img-card img {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .img-label {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.6));
    color: white; font-size: 11px; padding: 8px 8px 6px;
    font-weight: 500;
  }

  /* COLOUR CODE BOXES */
  .colour-codes { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
  .colour-box {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; border-radius: 10px;
  }
  .colour-dot { width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0; }
  .colour-desc { font-size: 14px; font-weight: 500; }

  /* STEPS */
  .steps-list { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
  .step-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px; background: #f8faff;
    border-radius: 10px; border-left: 3px solid var(--primary);
  }
  .step-num {
    width: 26px; height: 26px; background: var(--primary);
    color: white; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; flex-shrink: 0;
  }
  .step-text { font-size: 14px; line-height: 1.5; padding-top: 2px; }

  /* ALERT/TIP BOXES */
  .tip-box {
    border-radius: 10px; padding: 12px 14px;
    margin-top: 10px; font-size: 14px;
    display: flex; align-items: flex-start; gap: 10px;
  }
  .tip-box.warning { background: #fff8e1; border-left: 4px solid #f9a825; }
  .tip-box.info { background: #e3f2fd; border-left: 4px solid var(--primary); }
  .tip-box.danger { background: #ffebee; border-left: 4px solid var(--danger); }
  .tip-box.success { background: #e8f5e9; border-left: 4px solid var(--success); }
  .tip-icon { font-size: 20px; flex-shrink: 0; }
  .tip-text { line-height: 1.5; }

  /* PRACTICAL SECTION */
  .practical-section {
    background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
    border-radius: var(--radius); padding: 16px;
    margin-bottom: 16px; border: 1px solid #a5d6a7;
  }
  .practical-title {
    font-family: 'Baloo 2', cursive;
    font-size: 16px; font-weight: 700;
    color: #2e7d32; margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .practical-item {
    display: flex; align-items: center; gap: 10px;
    background: white; border-radius: 8px;
    padding: 10px 12px; margin-bottom: 8px;
    font-size: 14px; color: #2e7d32;
    border: 1px solid #c8e6c9;
  }
  .practical-item:last-child { margin-bottom: 0; }

  /* COMPLETE BUTTON */
  .complete-section {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: white; padding: 16px;
    border-top: 1px solid var(--border);
    box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
    z-index: 50;
  }
  .complete-inner { max-width: 600px; margin: 0 auto; }
  .btn-complete {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, var(--success) 0%, #2e7d32 100%);
    color: white; border: none;
    border-radius: 14px; font-size: 17px;
    font-weight: 700; font-family: 'Baloo 2', cursive;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(52,168,83,0.4);
    transition: transform 0.15s;
  }
  .btn-complete:hover { transform: translateY(-1px); }
  .btn-complete:disabled {
    background: #ccc; box-shadow: none;
    cursor: not-allowed; transform: none;
  }

  /* QUIZ */
  .quiz-section {
    background: white; border-radius: var(--radius);
    border: 2px solid var(--primary); margin-bottom: 16px;
    overflow: hidden;
  }
  .quiz-header {
    background: var(--primary); padding: 12px 16px;
    color: white;
  }
  .quiz-title {
    font-family: 'Baloo 2', cursive;
    font-size: 16px; font-weight: 700;
  }
  .quiz-subtitle { font-size: 12px; opacity: 0.85; margin-top: 2px; }
  .quiz-body { padding: 16px; }
  .quiz-question {
    font-size: 15px; font-weight: 600;
    color: var(--text); margin-bottom: 12px;
    line-height: 1.4;
  }
  .quiz-options { display: flex; flex-direction: column; gap: 8px; }
  .quiz-option {
    padding: 11px 14px;
    border: 2px solid var(--border);
    border-radius: 10px; font-size: 14px;
    cursor: pointer; transition: all 0.15s;
    background: var(--bg);
    font-family: 'Hind', sans-serif;
    text-align: left;
  }
  .quiz-option:hover { border-color: var(--primary); background: #e8f0fe; }
  .quiz-option.correct { border-color: var(--success); background: #e8f5e9; color: #2e7d32; }
  .quiz-option.wrong { border-color: var(--danger); background: #ffebee; color: #c62828; }
  .quiz-feedback {
    margin-top: 12px; font-size: 14px;
    padding: 10px 12px; border-radius: 8px;
    display: none;
  }
  .quiz-feedback.show { display: block; }

  /* CELEBRATION */
  #celebration {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center; justify-content: center;
  }
  #celebration.show { display: flex; }
  .celebration-card {
    background: white; border-radius: 24px;
    padding: 40px 32px; text-align: center;
    max-width: 320px; width: 90%;
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .celebration-emoji { font-size: 64px; margin-bottom: 12px; }
  .celebration-title {
    font-family: 'Baloo 2', cursive;
    font-size: 24px; font-weight: 800;
    color: var(--text); margin-bottom: 8px;
  }
  .celebration-msg { font-size: 15px; color: var(--muted); margin-bottom: 24px; }
  .confetti-piece {
    position: fixed;
    width: 10px; height: 10px;
    animation: confettiFall linear forwards;
    border-radius: 2px;
    pointer-events: none; z-index: 300;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* CERTIFICATE */
  .cert-section {
    display: none;
    max-width: 600px; margin: 0 auto;
    padding: 20px 16px;
  }
  .cert-card {
    background: white; border-radius: 20px;
    border: 3px solid var(--accent);
    padding: 32px 24px; text-align: center;
    position: relative; overflow: hidden;
  }
  .cert-badge { font-size: 64px; margin-bottom: 12px; }
  .cert-title {
    font-family: 'Baloo 2', cursive;
    font-size: 20px; font-weight: 800;
    color: var(--primary); margin-bottom: 4px;
  }
  .cert-name {
    font-family: 'Baloo 2', cursive;
    font-size: 28px; font-weight: 800;
    color: var(--text); margin: 12px 0;
  }
  .cert-text { font-size: 14px; color: var(--muted); line-height: 1.6; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  .hidden { display: none !important; }
  .shimmer {
    background: linear-gradient(90deg, #f0f4f9 25%, #e3eaf5 50%, #f0f4f9 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
</style>
</head>
<body>

<!-- SPLASH / REGISTRATION -->
<div id="splash">
  <div class="splash-logo">🧹</div>
  <div class="splash-title">HK Pro Training</div>
  <div class="splash-sub">Professional Housekeeping Excellence Program</div>
  <div class="reg-card">
    <h2>👋 अपनी जानकारी भरें</h2>
    <div class="form-group">
      <label>आपका नाम</label>
      <input type="text" id="reg-name" placeholder="जैसे: Ramesh Kumar" />
    </div>
    <div class="form-group">
      <label>Employee ID (Optional)</label>
      <input type="text" id="reg-id" placeholder="जैसे: HK001" />
    </div>
    <div class="form-group">
      <label>Location / Site</label>
      <input type="text" id="reg-site" placeholder="जैसे: Ahmedabad Office" />
    </div>
    <button class="btn-primary" onclick="startTraining()">Training शुरू करें 🚀</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="app-header">
    <div class="header-inner">
      <div class="header-brand">🧹 HK Pro Training</div>
      <div class="header-staff" id="header-name">Staff</div>
    </div>
  </div>
  <div class="progress-section">
    <div class="progress-inner">
      <div class="progress-label">
        <span id="progress-text">0 / 7 दिन पूरे</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
  </div>
  <div class="content">
    <div class="section-title">📅 7 दिन की Training</div>
    <div class="day-grid" id="day-grid"></div>
  </div>
</div>

<!-- LESSON VIEW -->
<div id="lesson-view">
  <div class="lesson-header">
    <div class="lesson-header-inner">
      <button class="back-btn" onclick="backToHome()">← वापस जाएं</button>
      <div class="lesson-day-label" id="lesson-day-label">Day 1</div>
      <div class="lesson-title" id="lesson-title">Title</div>
      <div class="lesson-objective" id="lesson-objective">Objective</div>
    </div>
  </div>
  <div class="lesson-content" id="lesson-content"></div>
  <div class="complete-section">
    <div class="complete-inner">
      <button class="btn-complete" id="complete-btn" onclick="completeDay()">
        ✅ Day पूरी की — Mark Complete
      </button>
    </div>
  </div>
</div>

<!-- CELEBRATION OVERLAY -->
<div id="celebration">
  <div class="celebration-card">
    <div class="celebration-emoji" id="cel-emoji">🎉</div>
    <div class="celebration-title" id="cel-title">Shabash!</div>
    <div class="celebration-msg" id="cel-msg">Day complete!</div>
    <button class="btn-primary" onclick="closeCelebration()">आगे बढ़ें →</button>
  </div>
</div>

<script>
// ============================================================
// CONFIGURATION — Google Sheets Web App URL यहाँ paste करें
// ============================================================
const GOOGLE_SHEET_URL = 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE';

// ============================================================
// TRAINING DATA — 7 Days
// ============================================================
const DAYS = [
  {
    id: 1,
    emoji: '👋',
    title: 'Introduction + Grooming + Work Discipline',
    subtitle: 'पहचान, पेशेवर व्यवहार और अनुशासन',
    objective: 'Staff को समझ आए कि Housekeeping का role क्या है और professional behaviour क्या होता है। आपका काम सिर्फ सफाई नहीं — यह पूरी company की image है!',
    images: [

// ============================================================
// STATE
// ============================================================
let staffInfo = {};
let completedDays = [];
let currentDay = null;
let quizAnswered = false;
let quizCorrect = false;

function loadState() {
  try {
    const saved = localStorage.getItem('hk_staff');
    if (saved) staffInfo = JSON.parse(saved);
    const comp = localStorage.getItem('hk_completed');
    if (comp) completedDays = JSON.parse(comp);
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem('hk_staff', JSON.stringify(staffInfo));
    localStorage.setItem('hk_completed', JSON.stringify(completedDays));
  } catch(e) {}
}

function getUnlockedDay() {
  return completedDays.length + 1;
}

// ============================================================
// REGISTRATION
// ============================================================
function startTraining() {
  const name = document.getElementById('reg-name').value.trim();
  const id = document.getElementById('reg-id').value.trim();
  const site = document.getElementById('reg-site').value.trim();
  if (!name) { alert('कृपया अपना नाम भरें'); return; }
  staffInfo = { name, id, site, registeredAt: new Date().toISOString() };
  saveState();
  showApp();
}

function showApp() {
  document.getElementById('splash').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('header-name').textContent = staffInfo.name;
  renderDays();
  updateProgress();
}

// ============================================================
// RENDER DAYS
// ============================================================
function renderDays() {
  const grid = document.getElementById('day-grid');
  const unlocked = getUnlockedDay();
  grid.innerHTML = '';
  DAYS.forEach(day => {
    const done = completedDays.includes(day.id);
    const active = day.id === unlocked;
    const locked = day.id > unlocked;
    const card = document.createElement('div');
    card.className = `day-card ${done ? 'completed' : active ? 'active' : 'locked'}`;
    if (!locked) card.onclick = () => openLesson(day.id);
    card.innerHTML = `
      <div class="day-header">
        <div class="day-icon">${day.emoji}</div>
        <div class="day-info">
          <div class="day-num">Day ${day.id}</div>
          <div class="day-title">${day.title}</div>
          <div class="day-subtitle">${day.subtitle}</div>
        </div>
        <div class="day-status">${done ? '✅' : active ? '▶️' : '🔒'}</div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function updateProgress() {
  const pct = Math.round((completedDays.length / 7) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${completedDays.length} / 7 दिन पूरे`;
  document.getElementById('progress-pct').textContent = pct + '%';
  if (completedDays.length === 7) showCertificate();
}

// ============================================================
// OPEN LESSON
// ============================================================
function openLesson(dayId) {
  currentDay = DAYS.find(d => d.id === dayId);
  quizAnswered = false;
  quizCorrect = false;
  document.getElementById('app').style.display = 'none';
  document.getElementById('lesson-view').style.display = 'block';
  document.getElementById('lesson-day-label').textContent = `Day ${currentDay.id} of 7`;
  document.getElementById('lesson-title').textContent = currentDay.title;
  document.getElementById('lesson-objective').textContent = '🎯 ' + currentDay.objective;
  renderLesson();
  window.scrollTo(0,0);
  updateCompleteBtn();
}

function backToHome() {
  document.getElementById('lesson-view').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

function renderLesson() {
  const day = currentDay;
  let html = '';

  // Images
  html += `<div class="image-section">
    <div class="image-section-title">📸 Reference Images</div>
    <div class="image-grid">`;
  day.images.forEach(img => {
    html += `<div class="img-card">
      <img src="${img.url}" alt="${img.label}" loading="lazy" onerror="this.style.display='none'">
      <div class="img-label">${img.label}</div>
    </div>`;
  });
  html += `</div></div>`;

  // Topics
  day.topics.forEach(topic => {
    html += `<div class="topic-section">
      <div class="topic-header">
        <div class="topic-emoji">${topic.emoji}</div>
        <div class="topic-name">${topic.name}</div>
      </div>
      <div class="topic-body">`;

    if (topic.isColour && topic.colours) {
      html += `<div class="colour-codes">`;
      topic.colours.forEach(c => {
        html += `<div class="colour-box" style="background:${c.bg}">
          <div class="colour-dot" style="background:${c.color}"></div>
          <div>
            <div class="colour-desc" style="color:${c.color};font-weight:700">${c.area}</div>
            <div style="font-size:13px;color:#555">${c.desc}</div>
          </div>
        </div>`;
      });
      html += `</div>`;
    } else if (topic.isSteps && topic.steps) {
      html += `<div class="steps-list">`;
      topic.steps.forEach((step, i) => {
        html += `<div class="step-item">
          <div class="step-num">${i+1}</div>
          <div class="step-text">${step}</div>
        </div>`;
      });
      html += `</div>`;
    } else if (topic.points) {
      topic.points.forEach(pt => {
        html += `<div class="topic-point">
          <div class="point-bullet"></div>
          <div>
            <div class="point-text">${pt.text}</div>
            ${pt.sub ? `<div class="point-sub">${pt.sub}</div>` : ''}
          </div>
        </div>`;
      });
    }

    if (topic.tip) {
      html += `<div class="tip-box ${topic.tip.type}">
        <div class="tip-icon">${topic.tip.icon}</div>
        <div class="tip-text">${topic.tip.text}</div>
      </div>`;
    }

    html += `</div></div>`;
  });

  // Practical
  html += `<div class="practical-section">
    <div class="practical-title">🛠️ Practical Activities</div>`;
  day.practical.forEach(p => {
    html += `<div class="practical-item">✋ ${p}</div>`;
  });
  html += `</div>`;

  // Quiz
  const q = day.quiz;
  html += `<div class="quiz-section">
    <div class="quiz-header">
      <div class="quiz-title">📝 Quick Quiz</div>
      <div class="quiz-subtitle">अपना ज्ञान check करें</div>
    </div>
    <div class="quiz-body">
      <div class="quiz-question">${q.question}</div>
      <div class="quiz-options" id="quiz-opts">`;
  q.options.forEach((opt, i) => {
    html += `<button class="quiz-option" onclick="answerQuiz(${i})">${opt}</button>`;
  });
  html += `</div>
      <div class="quiz-feedback" id="quiz-feedback"></div>
    </div>
  </div>`;

  // 40px spacer
  html += `<div style="height:40px"></div>`;

  document.getElementById('lesson-content').innerHTML = html;
}

function answerQuiz(idx) {
  if (quizAnswered) return;
  quizAnswered = true;
  const q = currentDay.quiz;
  quizCorrect = idx === q.correct;
  const opts = document.querySelectorAll('.quiz-option');
  opts.forEach((opt, i) => {
    opt.disabled = true;
    if (i === q.correct) opt.classList.add('correct');
    else if (i === idx && !quizCorrect) opt.classList.add('wrong');
  });
  const fb = document.getElementById('quiz-feedback');
  fb.className = `quiz-feedback show tip-box ${quizCorrect ? 'success' : 'warning'}`;
  fb.innerHTML = `<div class="tip-icon">${quizCorrect ? '🎉' : '💡'}</div><div class="tip-text">${q.explanation}</div>`;
  updateCompleteBtn();
}

function updateCompleteBtn() {
  const btn = document.getElementById('complete-btn');
  const isDone = completedDays.includes(currentDay.id);
  if (isDone) {
    btn.textContent = '✅ यह Day पहले ही पूरी हो चुकी है';
    btn.disabled = true;
  } else if (!quizAnswered) {
    btn.textContent = '📝 पहले Quiz attempt करें';
    btn.disabled = true;
  } else {
    btn.textContent = '✅ Day पूरी की — Mark Complete!';
    btn.disabled = false;
  }
}

// ============================================================
// COMPLETE DAY
// ============================================================
async function completeDay() {
  const day = currentDay;
  if (completedDays.includes(day.id)) return;
  completedDays.push(day.id);
  saveState();

  // Send to Google Sheets
  sendToGoogleSheet(day.id);

  // Show celebration
  showCelebration(day);
}

function showCelebration(day) {
  const msgs = [
    ['🎉', 'Zabardast!', `Day ${day.id} complete! Aap ne aaj professional housekeeping ki foundation seekhi. Kal Day 2 mein milenge!`],
    ['🌟', 'Wah kya baat hai!', `Cleaning sequence aur colour coding ab aapko pata hai. Kal chemicals seekhenge!`],
    ['💪', 'Bahut acha!', `Chemicals ka safe use seekha. Aap ek professional ban rahe hain!`],
    ['🛠️', 'Excellent!', `Tools ka sahi use aana chahiye — aapne seekha! Kal floor cleaning hogi.`],
    ['✨', 'Khatarnak performance!', `Floor care mein aap expert ho gaye. Kal washroom SOP seekhenge!`],
    ['🚽', 'Champion!', `Washroom cleaning SOP master kar li! Aaj sirf ek din aur bacha hai!`],
    ['🏆', 'Training Complete!', `7 din mein aapne poori HK Training complete kar li! Aap ab ek certified professional hain!`]
  ];
  const [emoji, title, msg] = msgs[day.id - 1] || msgs[0];
  document.getElementById('cel-emoji').textContent = emoji;
  document.getElementById('cel-title').textContent = title;
  document.getElementById('cel-msg').textContent = msg;
  document.getElementById('celebration').classList.add('show');
  launchConfetti();
}

function closeCelebration() {
  document.getElementById('celebration').classList.remove('show');
  document.querySelectorAll('.confetti-piece').forEach(el => el.remove());
  backToHome();
  renderDays();
  updateProgress();
}

function launchConfetti() {
  const colors = ['#1a73e8','#fbbc04','#34a853','#ea4335','#9c27b0','#ff9800'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.cssText = `
        left: ${Math.random() * 100}vw;
        top: -20px;
        background: ${colors[Math.floor(Math.random() * colors.length)]};
        animation-duration: ${1.5 + Math.random() * 2}s;
        animation-delay: ${Math.random() * 0.5}s;
        transform: rotate(${Math.random() * 360}deg);
        width: ${6 + Math.random() * 8}px;
        height: ${6 + Math.random() * 8}px;
      `;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }, i * 30);
  }
}

async function sendToGoogleSheet(dayId) {
  if (!GOOGLE_SHEET_URL || GOOGLE_SHEET_URL === 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE') return;
  try {
    const payload = {
      name: staffInfo.name,
      employeeId: staffInfo.id || 'N/A',
      site: staffInfo.site || 'N/A',
      dayId: dayId,
      dayTitle: DAYS[dayId-1].title,
      completedAt: new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' }),
      timestamp: new Date().toISOString()
    };
    await fetch(GOOGLE_SHEET_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
  } catch(e) {
    console.log('Sheet sync failed (offline?):', e);
  }
}

        ने HK Pro Training Program के सभी 7 दिन सफलतापूर्वक पूरे किए हैं।<br><br>
        आप अब एक Professional Housekeeping Staff Member हैं।<br>

  `;
